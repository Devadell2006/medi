{% extends 'layout.html' %}
{% block title %}Add New Doctor – Admin{% endblock %}

{% block content %}
<div class="mb-3">
    <a href="{{ url_for('admin.doctors') }}" class="btn btn-outline btn-sm">
        <i class="ph ph-arrow-left"></i> Back to Doctors
    </a>
</div>

<div class="page-header">
    <h2><i class="ph-fill ph-plus-circle" style="color:var(--primary);"></i> Add New Doctor</h2>
    <p>Manually register a new doctor account and professional profile.</p>
</div>

<div class="glass-card" style="max-width:800px;margin:0 auto;">
    <form method="POST" action="{{ url_for('admin.add_doctor') }}">
        <div class="section-title"><i class="ph-fill ph-user-circle" style="color:var(--primary);"></i> Account Credentials</div>
        <div class="grid grid-cols-2">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="doctor@example.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Temporary Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
        </div>

        <hr class="divider">
        <div class="section-title"><i class="ph-fill ph-stethoscope" style="color:var(--primary);"></i> Professional Profile</div>
        
        <div class="grid grid-cols-2">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-control" placeholder="Dr. Jane Smith" required>
            </div>
            <div class="form-group">
                <label class="form-label">Specialization</label>
                <input type="text" name="specialization" class="form-control" placeholder="Cardiologist" required>
            </div>
        </div>

        <div class="grid grid-cols-2">
            <div class="form-group">
                <label class="form-label">Hospital / Clinic</label>
                <input type="text" name="hospital" class="form-control" placeholder="Global Health Center" required>
            </div>
            <div class="form-group">
                <label class="form-label">Location</label>
                <input type="text" name="location" class="form-control" placeholder="London, UK" required>
            </div>
        </div>

        <div class="form-group" style="max-width:200px;">
            <label class="form-label">Years of Experience</label>
            <input type="number" name="experience" class="form-control" value="0" min="0" required>
        </div>

        <div class="flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">
                <i class="ph ph-user-plus"></i> Register Doctor
            </button>
            <a href="{{ url_for('admin.doctors') }}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
